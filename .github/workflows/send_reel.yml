name: Create and Publish Reel on Instagram
on: workflow_dispatch

jobs:
    test_secret:
        runs-on: ubuntu-latest
        steps:
            - run: echo "::mask::${{secrets.IG_USER_ID}}"
    create-reel:
        uses: "ridgeway-warrior/video-maker/.github/workflows/create_video.yml@main"
        secrets: inherit
    publish_reel:
        needs: create-reel
        uses: "ridgeway-warrior/ig-reel-uploader/.github/workflows/publish_video.yml@master" 
        secrets: inherit
    


