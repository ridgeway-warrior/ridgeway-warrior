name: Deploy AWS Lambda

on:
  push:
    branches: 
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write # Required for OIDC authentication
      contents: read  # Required to check out the repository
    steps:
      - uses: actions/checkout@v7
      
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: arn:aws:iam::781911158210:role/Github_Actions_Ridgeway_Warrior
          aws-region: us-west-2
      
      - name: Setup Node
        uses: "actions/setup-node@main"
        with: 
          node-version: 24
      
      - name: donwload depencies
        run: |
          cd aws-lambda
          npm ci
      
      - name: Build application with ESBuild
        run: |
          cd aws-lambda
          npm run build

      - name: Deploy Lambda Function
        uses: aws-actions/aws-lambda-deploy@v1
        with:
          function-name: ridgway-warrior-workflow-caller 
          code-artifacts-dir: aws-lambda/dist